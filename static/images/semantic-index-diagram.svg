<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-label="심볼 단위 질의와 Semantic Code Index의 대비: 점을 찍어가며 그리기 vs 미리 그려둔 그림">
  <title>심볼 단위 질의 vs Semantic Code Index</title>
  <desc>왼쪽: 사용자가 LSP 서버에 여러 번 point query를 던지며 점묘화처럼 관계 그래프를 재구성하는 모습. 오른쪽: 이미 완성된 그래프 DB에 여러 agent가 선언적 쿼리를 던지는 모습.</desc>

  <style>
    /* 라이트 모드 기본값 */
    :root, svg {
      --fg: #24292e;
      --fg-muted: #6a737d;
      --accent: #c9564a;
      --accent-muted: #e8a097;
      --bg-fill: rgba(0, 0, 0, 0.02);
      --dashed-fill: rgba(201, 86, 74, 0.04);
      --solid-fill: rgba(201, 86, 74, 0.06);
    }

    /* 다크 모드 */
    @media (prefers-color-scheme: dark) {
      :root, svg {
        --fg: #d4d4d4;
        --fg-muted: #8b8b8b;
        --accent: #e89484;
        --accent-muted: #a86659;
        --bg-fill: rgba(255, 255, 255, 0.03);
        --dashed-fill: rgba(232, 148, 132, 0.05);
        --solid-fill: rgba(232, 148, 132, 0.08);
      }
    }

    .fg-stroke { stroke: var(--fg); fill: none; }
    .fg-stroke-muted { stroke: var(--fg-muted); fill: none; }
    .accent-stroke { stroke: var(--accent); fill: none; }
    .accent-fill { fill: var(--accent); }
    .accent-muted-fill { fill: var(--accent-muted); }
    .fg-fill { fill: var(--fg); }
    .fg-muted-fill { fill: var(--fg-muted); }

    .title-text {
      fill: var(--fg);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 600;
    }
    .label-text {
      fill: var(--fg);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }
    .muted-text {
      fill: var(--fg-muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-style: italic;
    }
    .accent-text {
      fill: var(--accent);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 600;
    }
    .mono-text {
      fill: var(--fg-muted);
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 13px;
    }
  </style>

  <defs>
    <!-- 화살표 마커: 기본 (fg) -->
    <marker id="arrow-fg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="fg-fill"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="fg-muted-fill"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="accent-fill"/>
    </marker>
  </defs>

  <!-- ================================================================= -->
  <!-- 제목 -->
  <!-- ================================================================= -->
  <text x="220" y="30" text-anchor="middle" class="title-text">심볼 단위 질의</text>
  <text x="220" y="50" text-anchor="middle" class="muted-text">점을 찍어가며 그림을 그린다</text>

  <text x="820" y="30" text-anchor="middle" class="title-text">Semantic Code Index</text>
  <text x="820" y="50" text-anchor="middle" class="muted-text">이미 그려둔 그림에 질의한다</text>

  <!-- ================================================================= -->
  <!-- 왼쪽 패널: 심볼 단위 질의 -->
  <!-- ================================================================= -->

  <!-- 왼쪽 전체 영역 (휘발성 점선 테두리) -->
  <rect x="30" y="70" width="380" height="460" rx="8"
        stroke-dasharray="6 4" stroke-width="1.2"
        class="fg-stroke-muted"
        fill="var(--dashed-fill)"/>
  <text x="40" y="90" class="mono-text">volatile · session-scoped</text>

  <!-- LSP 서버 박스 (위쪽) -->
  <rect x="60" y="110" width="320" height="90" rx="6"
        stroke-width="1.5" class="fg-stroke"
        fill="var(--bg-fill)"/>
  <text x="75" y="130" class="label-text" font-weight="600">LSP Server</text>
  <text x="75" y="146" class="muted-text">심볼 카탈로그 + 지역 이웃 정보</text>

  <!-- LSP 내부의 심볼 점들 (카탈로그 느낌) -->
  <g>
    <circle cx="85" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="110" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="135" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="160" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="185" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="210" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="235" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="260" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="285" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="310" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="335" cy="175" r="3.5" class="fg-fill"/>
    <circle cx="360" cy="175" r="3.5" class="fg-fill"/>
  </g>

  <!-- 질의 화살표들 (서버 ↔ 사용자 영역) -->
  <g stroke-width="1" class="fg-stroke-muted" opacity="0.7">
    <path d="M 110 200 Q 105 260 130 310" marker-end="url(#arrow-muted)"/>
    <path d="M 190 200 Q 195 260 180 310" marker-end="url(#arrow-muted)"/>
    <path d="M 270 200 Q 275 260 260 310" marker-end="url(#arrow-muted)"/>
    <path d="M 340 200 Q 335 260 310 310" marker-end="url(#arrow-muted)"/>
    <path d="M 135 305 Q 125 255 115 205" marker-end="url(#arrow-muted)"/>
    <path d="M 215 305 Q 225 255 230 205" marker-end="url(#arrow-muted)"/>
  </g>
  <text x="90" y="255" class="mono-text" transform="rotate(-10, 90, 255)">N queries</text>

  <!-- 사용자/Agent 영역 -->
  <rect x="60" y="320" width="320" height="190" rx="6"
        stroke-width="1" class="fg-stroke-muted"
        fill="none" stroke-dasharray="3 3"/>
  <text x="75" y="340" class="label-text">Agent / Developer 세션</text>
  <text x="75" y="356" class="muted-text">재구성한 관계 그래프</text>

  <!-- 사용자가 재구성 중인 그래프 (일부만 연결됨) -->
  <g>
    <!-- 연결된 점들 (완성 부분) -->
    <line x1="110" y1="395" x2="155" y2="420" class="accent-stroke" stroke-width="1.3"/>
    <line x1="155" y1="420" x2="200" y2="400" class="accent-stroke" stroke-width="1.3"/>
    <line x1="200" y1="400" x2="155" y2="420" class="accent-stroke" stroke-width="1.3"/>
    <line x1="110" y1="395" x2="130" y2="455" class="accent-stroke" stroke-width="1.3"/>
    <line x1="130" y1="455" x2="180" y2="470" class="accent-stroke" stroke-width="1.3"/>

    <!-- 아직 연결 안 된 점들 -->
    <line x1="180" y1="470" x2="240" y2="450" class="fg-stroke-muted" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>

    <!-- 점들 (연결된 것은 accent, 미연결은 fg-muted) -->
    <circle cx="110" cy="395" r="4.5" class="accent-fill"/>
    <circle cx="155" cy="420" r="4.5" class="accent-fill"/>
    <circle cx="200" cy="400" r="4.5" class="accent-fill"/>
    <circle cx="130" cy="455" r="4.5" class="accent-fill"/>
    <circle cx="180" cy="470" r="4.5" class="accent-fill"/>

    <!-- 아직 찍지 않은 점 (연한 회색) -->
    <circle cx="240" cy="450" r="4" class="fg-muted-fill" opacity="0.5"/>
    <circle cx="290" cy="410" r="4" class="fg-muted-fill" opacity="0.5"/>
    <circle cx="320" cy="470" r="4" class="fg-muted-fill" opacity="0.5"/>
    <circle cx="270" cy="380" r="4" class="fg-muted-fill" opacity="0.5"/>
  </g>

  <!-- 세션 끝나면 사라진다는 암시 -->
  <text x="220" y="498" text-anchor="middle" class="muted-text">세션 종료 시 사라짐</text>

  <!-- ================================================================= -->
  <!-- 중앙 전환 화살표 -->
  <!-- ================================================================= -->
  <g transform="translate(437, 280)">
    <path d="M 0 0 L 155 0" class="accent-stroke" stroke-width="2" marker-end="url(#arrow-accent)"/>
    <text x="77" y="-12" text-anchor="middle" class="accent-text">발상의 전환</text>
    <text x="77" y="18" text-anchor="middle" class="muted-text">그림을 미리 그려둔다</text>
  </g>

  <!-- ================================================================= -->
  <!-- 오른쪽 패널: Semantic Code Index -->
  <!-- ================================================================= -->

  <!-- 오른쪽 전체 영역 (비휘발성 실선 테두리) -->
  <rect x="620" y="70" width="360" height="460" rx="8"
        stroke-width="1.5"
        class="fg-stroke"
        fill="var(--solid-fill)"/>
  <text x="630" y="90" class="mono-text">persistent · shared</text>

  <!-- Graph DB 박스 (중앙) -->
  <rect x="680" y="190" width="240" height="200" rx="6"
        stroke-width="1.5" class="fg-stroke"
        fill="var(--bg-fill)"/>
  <text x="800" y="214" text-anchor="middle" class="label-text" font-weight="600">Graph DB</text>
  <text x="800" y="230" text-anchor="middle" class="muted-text">관계 그래프 (완성)</text>

  <!-- 완성된 그래프 노드/엣지들 -->
  <g>
    <!-- 엣지들 (모두 accent 색으로, 완성됨을 표시) -->
    <line x1="730" y1="275" x2="780" y2="260" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="260" x2="840" y2="275" class="accent-stroke" stroke-width="1.4"/>
    <line x1="840" y1="275" x2="875" y2="315" class="accent-stroke" stroke-width="1.4"/>
    <line x1="875" y1="315" x2="845" y2="360" class="accent-stroke" stroke-width="1.4"/>
    <line x1="845" y1="360" x2="780" y2="365" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="365" x2="720" y2="345" class="accent-stroke" stroke-width="1.4"/>
    <line x1="720" y1="345" x2="730" y2="275" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="260" x2="780" y2="320" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="320" x2="840" y2="275" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="320" x2="720" y2="345" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="320" x2="780" y2="365" class="accent-stroke" stroke-width="1.4"/>
    <line x1="780" y1="320" x2="845" y2="360" class="accent-stroke" stroke-width="1.4"/>

    <!-- 노드들 -->
    <circle cx="730" cy="275" r="5" class="accent-fill"/>
    <circle cx="780" cy="260" r="5" class="accent-fill"/>
    <circle cx="840" cy="275" r="5" class="accent-fill"/>
    <circle cx="875" cy="315" r="5" class="accent-fill"/>
    <circle cx="845" cy="360" r="5" class="accent-fill"/>
    <circle cx="780" cy="365" r="5" class="accent-fill"/>
    <circle cx="720" cy="345" r="5" class="accent-fill"/>
    <circle cx="780" cy="320" r="5" class="accent-fill"/>
  </g>

  <!-- 여러 Agent가 각자 쿼리 -->
  <g>
    <!-- 왼쪽 위 agent -->
    <rect x="640" y="110" width="80" height="40" rx="4" stroke-width="1" class="fg-stroke" fill="var(--bg-fill)"/>
    <text x="680" y="128" text-anchor="middle" class="muted-text">Agent A</text>
    <text x="680" y="142" text-anchor="middle" class="mono-text">SELECT ...</text>
    <path d="M 700 150 L 730 190" stroke-width="1.3" class="fg-stroke" marker-end="url(#arrow-fg)"/>

    <!-- 오른쪽 위 agent -->
    <rect x="880" y="110" width="80" height="40" rx="4" stroke-width="1" class="fg-stroke" fill="var(--bg-fill)"/>
    <text x="920" y="128" text-anchor="middle" class="muted-text">Agent B</text>
    <text x="920" y="142" text-anchor="middle" class="mono-text">MATCH ...</text>
    <path d="M 900 150 L 870 190" stroke-width="1.3" class="fg-stroke" marker-end="url(#arrow-fg)"/>

    <!-- 왼쪽 아래 agent -->
    <rect x="640" y="430" width="80" height="40" rx="4" stroke-width="1" class="fg-stroke" fill="var(--bg-fill)"/>
    <text x="680" y="448" text-anchor="middle" class="muted-text">Agent C</text>
    <text x="680" y="462" text-anchor="middle" class="mono-text">FROM ...</text>
    <path d="M 700 430 L 730 390" stroke-width="1.3" class="fg-stroke" marker-end="url(#arrow-fg)"/>

    <!-- 오른쪽 아래 agent -->
    <rect x="880" y="430" width="80" height="40" rx="4" stroke-width="1" class="fg-stroke" fill="var(--bg-fill)"/>
    <text x="920" y="448" text-anchor="middle" class="muted-text">Agent D</text>
    <text x="920" y="462" text-anchor="middle" class="mono-text">WHERE ...</text>
    <path d="M 900 430 L 870 390" stroke-width="1.3" class="fg-stroke" marker-end="url(#arrow-fg)"/>
  </g>

  <!-- 공유 자원임을 강조 -->
  <text x="800" y="505" text-anchor="middle" class="muted-text">여러 세션·사용자가 같은 DB에 질의</text>
</svg>
