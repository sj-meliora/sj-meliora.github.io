<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-label="경로 하나를 찾는 비용: LSP로 ISR에서 blocking 함수까지의 경로 하나를 찾는 과정">
  <title>경로 하나를 찾는 비용</title>
  <desc>정적 호출 그래프 위에서 ISR에서 mutex_lock까지 이어지는 하나의 경로를 BFS 4회로 추적하는 과정. 경로에 포함된 노드와 엣지는 강조되고, 미탐색 가지는 점선과 물음표로 표시된다. 나머지는 dimmed.</desc>

  <style>
    :root, svg {
      --fg: #24292e;
      --fg-muted: #424a52;
      --fg-faint: #b5bac0;
      --accent: #c9564a;
      --bg-fill: rgba(0, 0, 0, 0.02);
      --accent-bg: rgba(201, 86, 74, 0.08);
      --question-bg: rgba(0, 0, 0, 0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root, svg {
        --fg: #d4d4d4;
        --fg-muted: #a8a8a8;
        --fg-faint: #5a5a5a;
        --accent: #e89484;
        --bg-fill: rgba(255, 255, 255, 0.03);
        --accent-bg: rgba(232, 148, 132, 0.1);
        --question-bg: rgba(255, 255, 255, 0.04);
      }
    }

    .accent-stroke { stroke: var(--accent); fill: none; }
    .accent-fill { fill: var(--accent); }
    .fg-fill { fill: var(--fg); }
    .fg-muted-fill { fill: var(--fg-muted); }

    .title-text {
      fill: var(--fg);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 600;
    }
    .label-text {
      fill: var(--fg);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }
    .muted-text {
      fill: var(--fg-muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-style: italic;
    }
    .accent-text {
      fill: var(--accent);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 600;
    }
    .node-text {
      fill: var(--fg);
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 13px;
    }
    .node-text-accent {
      fill: var(--accent);
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 600;
    }
    .node-text-dim {
      fill: var(--fg-muted);
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 13px;
      opacity: 0.55;
    }
    .mono-text {
      fill: var(--fg-muted);
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12px;
    }
    .tag-text {
      fill: var(--accent);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 700;
    }
    .question-mark {
      fill: var(--accent);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 700;
    }
  </style>

  <defs>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--fg-muted)" opacity="0.35"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="accent-fill"/>
    </marker>
    <marker id="arrow-accent-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="accent-fill" opacity="0.55"/>
    </marker>
  </defs>

  <!-- ================================================================= -->
  <!-- 제목 -->
  <!-- ================================================================= -->
  <text x="500" y="35" text-anchor="middle" class="title-text">경로 하나를 찾는 비용</text>
  <text x="500" y="58" text-anchor="middle" class="muted-text">BFS 4회로 찾아낸 하나의 경로 — 미탐색 가지마다 같은 과정을 반복해야 한다</text>

  <!-- ================================================================= -->
  <!-- 질문 박스 -->
  <!-- ================================================================= -->
  <rect x="40" y="85" width="600" height="50" rx="6"
        stroke="var(--fg-faint)" fill="var(--question-bg)" stroke-width="1" fill-opacity="1"/>
  <text x="55" y="108" class="mono-text">Q.</text>
  <text x="75" y="108" class="label-text" font-style="italic">특정 ISR 핸들러에서 시작해, 최종적으로</text>
  <text x="75" y="127" class="label-text" font-style="italic">blocking 함수를 호출하게 되는 모든 실행 경로는?</text>

  <!-- ================================================================= -->
  <!-- 무관 엣지 (맨 먼저 그려서 뒤로 보냄) -->
  <!-- ================================================================= -->
  <g stroke="var(--fg-muted)" stroke-width="1" opacity="0.22" fill="none">
    <!-- read_status → parse_reg -->
    <path d="M 140 267 L 110 320" marker-end="url(#arrow-dim)"/>
    <!-- read_status → update_state -->
    <path d="M 170 267 L 215 320" marker-end="url(#arrow-dim)"/>
    <!-- log_trace → write_buffer -->
    <path d="M 540 267 L 620 320" marker-end="url(#arrow-dim)"/>
    <!-- update_state → acquire_resource -->
    <path d="M 230 352 L 230 405" marker-end="url(#arrow-dim)"/>
    <!-- queue_work → flush_pending (이건 미탐색이 아니라 무관으로 분류 — notify_task가 이미 선택됨) -->
    <!-- acquire_resource → msleep -->
    <path d="M 200 437 L 145 490" marker-end="url(#arrow-dim)"/>
    <!-- acquire_resource → spin_lock -->
    <path d="M 250 437 L 290 490" marker-end="url(#arrow-dim)"/>
  </g>

  <!-- ================================================================= -->
  <!-- 미탐색 엣지 (경로 노드에서 뻗어 나가지만 이번에 안 따라간 것) -->
  <!-- ================================================================= -->
  <g class="accent-stroke" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.55" fill="none">
    <!-- isr_handler → read_status (미탐색) -->
    <path d="M 305 196 L 175 235" marker-end="url(#arrow-accent-dashed)"/>
    <!-- isr_handler → log_trace (미탐색) -->
    <path d="M 375 196 L 505 235" marker-end="url(#arrow-accent-dashed)"/>
    <!-- handle_event → update_state (미탐색) -->
    <path d="M 320 267 L 255 320" marker-end="url(#arrow-accent-dashed)"/>
    <!-- handle_event → queue_work (미탐색) -->
    <path d="M 380 267 L 475 320" marker-end="url(#arrow-accent-dashed)"/>
    <!-- flush_pending → spin_lock (미탐색) -->
    <path d="M 410 437 L 330 490" marker-end="url(#arrow-accent-dashed)"/>
  </g>

  <!-- ================================================================= -->
  <!-- 선택된 경로 엣지 (강조) -->
  <!-- ================================================================= -->
  <g class="accent-stroke" stroke-width="2.2" fill="none">
    <!-- isr_handler → handle_event -->
    <path d="M 340 196 L 340 235" marker-end="url(#arrow-accent)"/>
    <!-- handle_event → notify_task -->
    <path d="M 340 267 L 360 320" marker-end="url(#arrow-accent)"/>
    <!-- notify_task → flush_pending -->
    <path d="M 380 352 L 420 405" marker-end="url(#arrow-accent)"/>
    <!-- flush_pending → mutex_lock -->
    <path d="M 455 437 L 480 490" marker-end="url(#arrow-accent)"/>
  </g>

  <!-- ================================================================= -->
  <!-- 노드들 -->
  <!-- ================================================================= -->

  <!-- 레벨 0: isr_handler (경로 노드, 태그 없음 - 시작점) -->
  <g>
    <rect x="280" y="160" width="120" height="36" rx="4"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.8"/>
    <text x="340" y="183" text-anchor="middle" class="node-text-accent">isr_handler</text>
  </g>

  <!-- 레벨 1 -->
  <g>
    <!-- read_status (dim) -->
    <rect x="100" y="235" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="155" y="256" text-anchor="middle" class="node-text-dim">read_status</text>

    <!-- handle_event (경로 노드) -->
    <rect x="285" y="235" width="110" height="32" rx="4"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.8"/>
    <text x="340" y="256" text-anchor="middle" class="node-text-accent">handle_event</text>

    <!-- log_trace (dim) -->
    <rect x="470" y="235" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="525" y="256" text-anchor="middle" class="node-text-dim">log_trace</text>
  </g>

  <!-- 레벨 2 -->
  <g>
    <rect x="40" y="320" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="95" y="341" text-anchor="middle" class="node-text-dim">parse_reg</text>

    <rect x="175" y="320" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="230" y="341" text-anchor="middle" class="node-text-dim">update_state</text>

    <!-- notify_task (경로 노드) -->
    <rect x="310" y="320" width="110" height="32" rx="4"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.8"/>
    <text x="365" y="341" text-anchor="middle" class="node-text-accent">notify_task</text>

    <rect x="445" y="320" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="500" y="341" text-anchor="middle" class="node-text-dim">queue_work</text>

    <rect x="580" y="320" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="635" y="341" text-anchor="middle" class="node-text-dim">write_buffer</text>
  </g>

  <!-- 레벨 3 -->
  <g>
    <rect x="175" y="405" width="110" height="32" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="230" y="426" text-anchor="middle" class="node-text-dim">acquire_resource</text>

    <!-- flush_pending (경로 노드) -->
    <rect x="380" y="405" width="110" height="32" rx="4"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.8"/>
    <text x="435" y="426" text-anchor="middle" class="node-text-accent">flush_pending</text>
  </g>

  <!-- 레벨 4: blocking 함수들 -->
  <g>
    <rect x="70" y="490" width="120" height="36" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="130" y="513" text-anchor="middle" class="node-text-dim">msleep</text>

    <rect x="240" y="490" width="120" height="36" rx="4"
          stroke="var(--fg-muted)" fill="var(--bg-fill)" stroke-width="1" opacity="0.35"/>
    <text x="300" y="513" text-anchor="middle" class="node-text-dim">spin_lock</text>

    <!-- mutex_lock (경로 노드) -->
    <rect x="430" y="490" width="120" height="36" rx="4"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.8"/>
    <text x="490" y="513" text-anchor="middle" class="node-text-accent">mutex_lock</text>
  </g>

  <!-- ================================================================= -->
  <!-- 물음표 마커 (미탐색 엣지의 중간에 배치) -->
  <!-- ================================================================= -->

  <!-- isr_handler → read_status 중간 -->
  <g>
    <circle cx="240" cy="215" r="9" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="240" y="219" text-anchor="middle" class="question-mark">?</text>
  </g>

  <!-- isr_handler → log_trace 중간 -->
  <g>
    <circle cx="440" cy="215" r="9" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="440" y="219" text-anchor="middle" class="question-mark">?</text>
  </g>

  <!-- handle_event → update_state 중간 -->
  <g>
    <circle cx="287" cy="293" r="9" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="287" y="297" text-anchor="middle" class="question-mark">?</text>
  </g>

  <!-- handle_event → queue_work 중간 -->
  <g>
    <circle cx="427" cy="293" r="9" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="427" y="297" text-anchor="middle" class="question-mark">?</text>
  </g>

  <!-- flush_pending → spin_lock 중간 -->
  <g>
    <circle cx="370" cy="463" r="9" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="370" y="467" text-anchor="middle" class="question-mark">?</text>
  </g>

  <!-- ================================================================= -->
  <!-- 선택된 엣지의 탐색 순서 태그 (엣지 바로 옆에 붙임, 겹치지 않게) -->
  <!-- ================================================================= -->

  <!-- ① isr_handler → handle_event (세로 엣지 x=340, 태그는 왼쪽 바로 옆) -->
  <g>
    <circle cx="322" cy="215" r="10" class="accent-stroke" stroke-width="1.5" fill="var(--bg-fill)"/>
    <text x="322" y="219" text-anchor="middle" class="tag-text">1</text>
  </g>

  <!-- ② handle_event → notify_task (사선, 태그는 엣지 오른쪽 법선 방향) -->
  <g>
    <circle cx="364" cy="290" r="10" class="accent-stroke" stroke-width="1.5" fill="var(--bg-fill)"/>
    <text x="364" y="294" text-anchor="middle" class="tag-text">2</text>
  </g>

  <!-- ③ notify_task → flush_pending (사선, 태그는 엣지 오른쪽 법선 방향) -->
  <g>
    <circle cx="414" cy="375" r="10" class="accent-stroke" stroke-width="1.5" fill="var(--bg-fill)"/>
    <text x="414" y="379" text-anchor="middle" class="tag-text">3</text>
  </g>

  <!-- ④ flush_pending → mutex_lock (사선, 태그는 엣지 오른쪽 법선 방향) -->
  <g>
    <circle cx="484" cy="463" r="10" class="accent-stroke" stroke-width="1.5" fill="var(--bg-fill)"/>
    <text x="484" y="467" text-anchor="middle" class="tag-text">4</text>
  </g>

  <!-- ================================================================= -->
  <!-- 우측 범례 + 해설 -->
  <!-- ================================================================= -->
  <g transform="translate(720, 160)">
    <!-- 범례 -->
    <text x="0" y="0" class="label-text" font-weight="600">범례</text>

    <!-- 경로 박스 -->
    <rect x="0" y="15" width="28" height="18" rx="3"
          class="accent-stroke" fill="var(--accent-bg)" stroke-width="1.5"/>
    <text x="40" y="29" class="muted-text">식별된 경로 노드</text>

    <!-- 경로 엣지 -->
    <line x1="0" y1="55" x2="28" y2="55" class="accent-stroke" stroke-width="2.2" marker-end="url(#arrow-accent)"/>
    <text x="40" y="59" class="muted-text">선택된 경로</text>

    <!-- 미탐색 엣지 + ? -->
    <line x1="0" y1="82" x2="28" y2="82" class="accent-stroke" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.55" marker-end="url(#arrow-accent-dashed)"/>
    <circle cx="14" cy="82" r="6" class="accent-stroke" stroke-width="1.3" stroke-dasharray="2 2" fill="var(--bg-fill)"/>
    <text x="14" y="85" text-anchor="middle" class="question-mark" font-size="9">?</text>
    <text x="40" y="86" class="muted-text">미탐색 가지</text>

    <!-- 태그 -->
    <circle cx="14" cy="108" r="9" class="accent-stroke" stroke-width="1.3" fill="var(--bg-fill)"/>
    <text x="14" y="112" text-anchor="middle" class="tag-text">n</text>
    <text x="40" y="112" class="muted-text">탐색 순서</text>

    <!-- 무관 -->
    <line x1="0" y1="135" x2="28" y2="135" stroke="var(--fg-muted)" stroke-width="1" opacity="0.3" fill="none" marker-end="url(#arrow-dim)"/>
    <text x="40" y="139" class="muted-text">경로와 무관</text>

    <!-- 구분선 -->
    <line x1="0" y1="160" x2="240" y2="160" stroke="var(--fg-faint)" stroke-width="1" opacity="0.5"/>

    <!-- 해설 박스: 한 경로를 찾는 과정 -->
    <text x="0" y="185" class="accent-text">한 경로를 찾는 과정</text>
    <text x="0" y="210" class="node-text">① 현재 노드의 callees 질의</text>
    <text x="0" y="234" class="node-text">② 이웃 중 유망한 분기 선택</text>
    <text x="0" y="258" class="node-text">③ 다음 노드로 이동, 반복</text>
    <text x="0" y="290" class="node-text-accent">→ 경로 하나에 4회 질의</text>
    <text x="0" y="310" class="node-text-accent">→ 미탐색 가지마다 반복</text>
  </g>
</svg>
