<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="680" height="440"
     viewBox="0 0 680 440"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
     role="img" aria-labelledby="title desc">
  <title id="title">LSP의 stateful 세션과 agent의 stateless 호출의 어긋남</title>
  <desc id="desc">위쪽 LSP는 하나의 세션 안에서 warm 인덱스를 유지하며 didOpen, didChange, didClose로 이어진다. 아래쪽 agent는 매 호출이 독립적이라 warm 인덱스의 이득이 매번 버려진다.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style><![CDATA[
      /* ── Light mode (default) ── */
      .q-amber-fill   { fill:   #FAEEDA; }
      .q-amber-stroke { stroke: #BA7517; }
      .q-amber-title  { fill:   #854F0B; }
      .q-amber-sub    { fill:   #BA7517; }

      .q-teal-fill    { fill:   #E1F5EE; }
      .q-teal-stroke  { stroke: #0F6E56; }
      .q-teal-title   { fill:   #0F6E56; }
      .q-teal-sub     { fill:   #1D9E75; }

      .q-gray-fill    { fill:   #F1EFE8; }
      .q-gray-stroke  { stroke: #888780; }
      .q-gray-title   { fill:   #5F5E5A; }
      .q-gray-sub     { fill:   #888780; }

      .axis        { stroke: #5F5E5A; }
      .axis-label, .caption { fill: #5F5E5A; }

      /* ── Dark mode via OS preference ── */
      @media (prefers-color-scheme: dark) {
        .q-amber-fill   { fill:   #633806; }
        .q-amber-stroke { stroke: #FAC775; }
        .q-amber-title  { fill:   #FAEEDA; }
        .q-amber-sub    { fill:   #FAC775; }

        .q-teal-fill    { fill:   #085041; }
        .q-teal-stroke  { stroke: #9FE1CB; }
        .q-teal-title   { fill:   #E1F5EE; }
        .q-teal-sub     { fill:   #9FE1CB; }

        .q-gray-fill    { fill:   #2C2C2A; }
        .q-gray-stroke  { stroke: #B4B2A9; }
        .q-gray-title   { fill:   #D3D1C7; }
        .q-gray-sub     { fill:   #B4B2A9; }

        .axis        { stroke: #B4B2A9; }
        .axis-label, .caption { fill: #B4B2A9; }
      }

      /* ── Dark mode via .dark class (인라인 SVG 대응) ── */
      .dark .q-amber-fill   { fill:   #633806; }
      .dark .q-amber-stroke { stroke: #FAC775; }
      .dark .q-amber-title  { fill:   #FAEEDA; }
      .dark .q-amber-sub    { fill:   #FAC775; }

      .dark .q-teal-fill    { fill:   #085041; }
      .dark .q-teal-stroke  { stroke: #9FE1CB; }
      .dark .q-teal-title   { fill:   #E1F5EE; }
      .dark .q-teal-sub     { fill:   #9FE1CB; }

      .dark .q-gray-fill    { fill:   #2C2C2A; }
      .dark .q-gray-stroke  { stroke: #B4B2A9; }
      .dark .q-gray-title   { fill:   #D3D1C7; }
      .dark .q-gray-sub     { fill:   #B4B2A9; }

      .dark .axis        { stroke: #B4B2A9; }
      .dark .axis-label, .dark .caption { fill: #B4B2A9; }
    ]]></style>
  </defs>

  <!-- ============ TOP: LSP stateful ============ -->
  <text class="q-teal-title" x="40" y="34" font-size="15" font-weight="500">LSP — stateful 세션</text>
  <text class="caption" x="40" y="54" font-size="12">하나의 세션 안에서 warm 인덱스가 유지된다</text>

  <!-- warm index band -->
  <rect class="q-teal-fill q-teal-stroke" x="120" y="78" width="440" height="42"
        rx="4" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="q-teal-title" x="340" y="105" text-anchor="middle"
        font-size="13" font-weight="500">warm index — incremental 갱신</text>

  <!-- session timeline -->
  <line class="axis" x1="80" y1="158" x2="600" y2="158" stroke-width="1"/>
  <text class="axis-label" x="608" y="162" font-size="11">time →</text>

  <!-- tick marks for events -->
  <line class="axis" x1="120" y1="153" x2="120" y2="163" stroke-width="1"/>
  <line class="axis" x1="230" y1="153" x2="230" y2="163" stroke-width="1"/>
  <line class="axis" x1="340" y1="153" x2="340" y2="163" stroke-width="1"/>
  <line class="axis" x1="450" y1="153" x2="450" y2="163" stroke-width="1"/>
  <line class="axis" x1="560" y1="153" x2="560" y2="163" stroke-width="1"/>

  <text class="axis-label" x="120" y="180" text-anchor="middle" font-size="11">didOpen</text>
  <text class="axis-label" x="230" y="180" text-anchor="middle" font-size="11">didChange</text>
  <text class="axis-label" x="340" y="180" text-anchor="middle" font-size="11">didChange</text>
  <text class="axis-label" x="450" y="180" text-anchor="middle" font-size="11">didChange</text>
  <text class="axis-label" x="560" y="180" text-anchor="middle" font-size="11">didClose</text>

  <!-- divider -->
  <line class="axis" x1="40" y1="220" x2="640" y2="220"
        stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- ============ BOTTOM: Agent stateless ============ -->
  <text class="q-amber-title" x="40" y="248" font-size="15" font-weight="500">Agent — stateless 호출</text>
  <text class="caption" x="40" y="268" font-size="12">매 호출이 독립적이라 세션 상태가 자연스럽게 이어지지 않는다</text>

  <!-- independent cold-start calls -->
  <rect class="q-amber-fill q-amber-stroke" x="100" y="298" width="100" height="58"
        rx="4" stroke-width="1"/>
  <text class="q-amber-title" x="150" y="320" text-anchor="middle"
        font-size="13" font-weight="500">tool call</text>
  <text class="q-amber-sub" x="150" y="340" text-anchor="middle" font-size="11">cold start</text>

  <rect class="q-amber-fill q-amber-stroke" x="220" y="298" width="100" height="58"
        rx="4" stroke-width="1"/>
  <text class="q-amber-title" x="270" y="320" text-anchor="middle"
        font-size="13" font-weight="500">tool call</text>
  <text class="q-amber-sub" x="270" y="340" text-anchor="middle" font-size="11">cold start</text>

  <rect class="q-amber-fill q-amber-stroke" x="340" y="298" width="100" height="58"
        rx="4" stroke-width="1"/>
  <text class="q-amber-title" x="390" y="320" text-anchor="middle"
        font-size="13" font-weight="500">tool call</text>
  <text class="q-amber-sub" x="390" y="340" text-anchor="middle" font-size="11">cold start</text>

  <rect class="q-amber-fill q-amber-stroke" x="460" y="298" width="100" height="58"
        rx="4" stroke-width="1"/>
  <text class="q-amber-title" x="510" y="320" text-anchor="middle"
        font-size="13" font-weight="500">tool call</text>
  <text class="q-amber-sub" x="510" y="340" text-anchor="middle" font-size="11">cold start</text>

  <!-- timeline -->
  <line class="axis" x1="80" y1="378" x2="600" y2="378" stroke-width="1"/>
  <text class="axis-label" x="608" y="382" font-size="11">time →</text>

  <line class="axis" x1="150" y1="373" x2="150" y2="383" stroke-width="1"/>
  <line class="axis" x1="270" y1="373" x2="270" y2="383" stroke-width="1"/>
  <line class="axis" x1="390" y1="373" x2="390" y2="383" stroke-width="1"/>
  <line class="axis" x1="510" y1="373" x2="510" y2="383" stroke-width="1"/>

  <text class="caption" x="40" y="412" font-size="11" font-style="italic">→ warm 인덱스의 이득이 매번 버려진다</text>
</svg>
